<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audiobook</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%); min-height: 100vh; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    .header { margin-bottom: 40px; }
    .header h1 { font-size: 32px; font-weight: 300; color: #111; margin-bottom: 8px; }
    .header p { color: #999; font-size: 14px; }
    .upload-area { background: white; border: 2px dashed #e5e7eb; border-radius: 12px; padding: 48px; text-align: center; cursor: pointer; transition: all 0.3s; }
    .upload-area:hover { border-color: #cbd5e1; }
    .upload-area input { display: none; }
    .upload-icon { width: 64px; height: 64px; background: #eff6ff; border-radius: 8px; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-size: 28px; }
    .upload-text { color: #374151; font-weight: 500; margin-bottom: 4px; }
    .upload-sub { color: #9ca3af; font-size: 13px; }
    .hidden { display: none !important; }
    .file-info { background: white; border-radius: 12px; padding: 20px; border: 1px solid #e5e7eb; margin-bottom: 20px; }
    .file-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .file-name { font-size: 18px; font-weight: 500; color: #111; }
    .progress-box { background: white; border-radius: 12px; padding: 20px; border: 1px solid #e5e7eb; margin-bottom: 20px; }
    .progress-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .progress-label-text { font-size: 11px; color: #999; text-transform: uppercase; }
    .progress-percent { font-family: monospace; font-size: 12px; font-weight: 600; color: #666; }
    .progress-bar { width: 100%; height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #2563eb, #3b82f6); transition: width 0.3s; }
    .controls { background: white; border-radius: 12px; padding: 32px; border: 1px solid #e5e7eb; }
    .playback-controls { display: flex; justify-content: center; gap: 16px; margin-bottom: 24px; }
    .btn-skip { padding: 12px; background: #f3f4f6; border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s; color: #374151; font-size: 14px; }
    .btn-skip:hover { background: #e5e7eb; }
    .btn-play { padding: 16px 32px; background: linear-gradient(135deg, #2563eb, #1d4ed8); border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: 600; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); transition: all 0.2s; }
    .btn-play:hover { box-shadow: 0 6px 16px rgba(37, 99, 235, 0.4); }
    .divider { height: 1px; background: #e5e7eb; margin: 20px 0; }
    .sliders { display: flex; flex-direction: column; gap: 20px; margin-bottom: 20px; }
    .slider-group label { font-size: 14px; font-weight: 500; color: #374151; margin-bottom: 8px; display: flex; justify-content: space-between; }
    .slider-value { font-family: monospace; font-size: 12px; color: #666; }
    input[type="range"] { width: 100%; height: 6px; border-radius: 3px; background: #e5e7eb; outline: none; accent-color: #2563eb; cursor: pointer; }
    .btn-change { width: 100%; padding: 12px; background: #f3f4f6; border: none; border-radius: 8px; color: #374151; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .btn-change:hover { background: #e5e7eb; }
    .preview { background: white; border-radius: 12px; padding: 20px; border: 1px solid #e5e7eb; margin-top: 32px; }
    .preview-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px; }
    .preview-text { font-family: monospace; font-size: 12px; color: #666; line-height: 1.6; max-height: 200px; overflow-y: auto; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Upload Section -->
    <div id="uploadSection">
      <div class="header">
        <h1>Audiobook</h1>
        <p>Escucha tus PDFs mientras manejas</p>
      </div>
      <label class="upload-area">
        <input type="file" id="pdfInput" accept=".pdf">
        <div class="upload-icon">📄</div>
        <div class="upload-text">Arrastra tu PDF aqui o haz clic</div>
        <div class="upload-sub">Hasta 50MB</div>
      </label>
    </div>

    <!-- Player Section -->
    <div id="playerSection" class="hidden">
      <div class="file-info">
        <div class="file-label">Leyendo</div>
        <div class="file-name" id="fileName"></div>
      </div>

      <div class="progress-box">
        <div class="progress-label">
          <span class="progress-label-text">Progreso</span>
          <span class="progress-percent" id="progressPercent">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
      </div>

      <div class="controls">
        <div class="playback-controls">
          <button class="btn-skip" id="skipBack">|&lt;</button>
          <button class="btn-play" id="playBtn">PLAY</button>
          <button class="btn-skip" id="skipForward">&gt;|</button>
        </div>

        <div class="sliders">
          <div class="slider-group">
            <label>
              <span>Saltar a carácter</span>
              <span class="slider-value" id="jumpValue">0</span>
            </label>
            <input type="number" id="jumpInput" min="0" placeholder="Ej: 50000" style="width: 100%; padding: 8px; border: 1px solid #e5e7eb; border-radius: 6px; font-family: monospace; margin-bottom: 12px;">
          </div>

          <div class="slider-group">
            <label>
              <span>Velocidad</span>
              <span class="slider-value" id="speedValue">1.0x</span>
            </label>
            <input type="range" id="speedSlider" min="0.5" max="2" step="0.1" value="1">
          </div>

          <div class="slider-group">
            <label>
              <span>Volumen</span>
              <span class="slider-value" id="volumeValue">100%</span>
            </label>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="1">
          </div>
        </div>

        <div class="divider"></div>

        <button class="btn-change" id="changeBtn">Cambiar archivo</button>
      </div>

      <div class="preview">
        <div class="preview-label">Vista previa</div>
        <div class="preview-text" id="preview"></div>
      </div>
    </div>
  </div>

  <script>
    window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let pdfText = '';
    let chunks = [];
    let currentChunkIndex = 0;
    let isSpeaking = false;
    let utterance = null;

    const elements = {
      uploadSection: document.getElementById('uploadSection'),
      playerSection: document.getElementById('playerSection'),
      pdfInput: document.getElementById('pdfInput'),
      fileName: document.getElementById('fileName'),
      progressFill: document.getElementById('progressFill'),
      progressPercent: document.getElementById('progressPercent'),
      playBtn: document.getElementById('playBtn'),
      skipBack: document.getElementById('skipBack'),
      skipForward: document.getElementById('skipForward'),
      changeBtn: document.getElementById('changeBtn'),
      speedSlider: document.getElementById('speedSlider'),
      speedValue: document.getElementById('speedValue'),
      volumeSlider: document.getElementById('volumeSlider'),
      volumeValue: document.getElementById('volumeValue'),
      preview: document.getElementById('preview')
    };

    // Load saved data
    function loadSavedData() {
      const saved = localStorage.getItem('audiobookData');
      if (saved) {
        try {
          const data = JSON.parse(saved);
          pdfText = data.text;
          chunks = data.chunks;
          elements.fileName.textContent = data.fileName;
          elements.preview.textContent = pdfText.substring(0, 500) + (pdfText.length > 500 ? '...' : '');
          showPlayer();
        } catch (e) {
          console.error('Error loading data:', e);
        }
      }
    }

    // Create chunks
    function createChunks(text) {
      const CHUNK_SIZE = 25000;
      const chunkArray = [];
      let currentPos = 0;
      while (currentPos < text.length) {
        let endPos = Math.min(currentPos + CHUNK_SIZE, text.length);
        if (endPos < text.length) {
          let searchEnd = endPos;
          while (searchEnd > currentPos && text[searchEnd] !== '.' && text[searchEnd] !== '\n') {
            searchEnd--;
          }
          if (searchEnd > currentPos) { endPos = searchEnd + 1; }
        }
        chunkArray.push(text.substring(currentPos, endPos));
        currentPos = endPos;
      }
      return chunkArray;
    }

    // Handle PDF upload
    elements.pdfInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      try {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await window.pdfjsLib.getDocument(arrayBuffer).promise;
        let fullText = '';

        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const textContent = await page.getTextContent();
          const pageText = textContent.items.map(item => item.str).join(' ');
          fullText += pageText + '\n\n';
        }

        pdfText = fullText;
        chunks = createChunks(fullText);
        currentChunkIndex = 0;

        elements.fileName.textContent = file.name;
        elements.preview.textContent = pdfText.substring(0, 500) + (pdfText.length > 500 ? '...' : '');

        const dataToSave = { text: pdfText, chunks: chunks, fileName: file.name };
        localStorage.setItem('audiobookData', JSON.stringify(dataToSave));

        showPlayer();
      } catch (error) {
        console.error('Error:', error);
        alert('Error cargando PDF');
      }
    });

    function showPlayer() {
      elements.uploadSection.classList.add('hidden');
      elements.playerSection.classList.remove('hidden');
    }

    function speakChunk(chunkIndex) {
      if (chunks.length === 0 || chunkIndex >= chunks.length) {
        isSpeaking = false;
        updatePlayButton();
        return;
      }

      utterance = new SpeechSynthesisUtterance(chunks[chunkIndex]);
      utterance.rate = parseFloat(elements.speedSlider.value);
      utterance.volume = parseFloat(elements.volumeSlider.value);

      utterance.onstart = () => {
        isSpeaking = true;
        currentChunkIndex = chunkIndex;
        updateProgress();
        updatePlayButton();
      };

      utterance.onend = () => {
        if (chunkIndex < chunks.length - 1) {
          setTimeout(() => speakChunk(chunkIndex + 1), 100);
        } else {
          isSpeaking = false;
          currentChunkIndex = 0;
          updateProgress();
          updatePlayButton();
        }
      };

      utterance.onpause = () => {
        isSpeaking = false;
        updatePlayButton();
      };

      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(utterance);
    }

    function updateProgress() {
      const percent = chunks.length > 0 ? (currentChunkIndex / chunks.length) * 100 : 0;
      elements.progressFill.style.width = percent + '%';
      elements.progressPercent.textContent = Math.round(percent) + '%';
    }

    function updatePlayButton() {
      elements.playBtn.textContent = isSpeaking ? 'PAUSA' : 'PLAY';
    }

    elements.playBtn.addEventListener('click', () => {
      if (isSpeaking) {
        window.speechSynthesis.pause();
        isSpeaking = false;
        updatePlayButton();
      } else {
        const synth = window.speechSynthesis;
        if (synth.paused) {
          synth.resume();
          isSpeaking = true;
        } else {
          speakChunk(currentChunkIndex);
        }
        updatePlayButton();
      }
    });

    elements.skipBack.addEventListener('click', () => {
      currentChunkIndex = Math.max(0, currentChunkIndex - 1);
      updateProgress();
      if (isSpeaking) {
        window.speechSynthesis.cancel();
        setTimeout(() => speakChunk(currentChunkIndex), 100);
      }
    });

    elements.skipForward.addEventListener('click', () => {
      currentChunkIndex = Math.min(chunks.length - 1, currentChunkIndex + 1);
      updateProgress();
      if (isSpeaking) {
        window.speechSynthesis.cancel();
        setTimeout(() => speakChunk(currentChunkIndex), 100);
      }
    });

    elements.changeBtn.addEventListener('click', () => {
      window.speechSynthesis.cancel();
      pdfText = '';
      chunks = [];
      currentChunkIndex = 0;
      isSpeaking = false;
      localStorage.removeItem('audiobookData');
      elements.uploadSection.classList.remove('hidden');
      elements.playerSection.classList.add('hidden');
      elements.pdfInput.value = '';
    });

    elements.speedSlider.addEventListener('input', (e) => {
      elements.speedValue.textContent = e.target.value + 'x';
    });

    elements.jumpInput = document.getElementById('jumpInput');
    if (elements.jumpInput) {
      elements.jumpInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          const charPos = parseInt(elements.jumpInput.value);
          if (charPos >= 0 && charPos <= pdfText.length) {
            // Encontrar el chunk correspondiente
            let charCount = 0;
            for (let i = 0; i < chunks.length; i++) {
              charCount += chunks[i].length;
              if (charCount >= charPos) {
                currentChunkIndex = i;
                updateProgress();
                if (isSpeaking) {
                  window.speechSynthesis.cancel();
                  setTimeout(() => speakChunk(currentChunkIndex), 100);
                }
                elements.jumpInput.value = '';
                break;
              }
            }
          }
        }
      });
    }

    elements.volumeSlider.addEventListener('input', (e) => {
      elements.volumeValue.textContent = Math.round(e.target.value * 100) + '%';
    });

    // Initialize
    loadSavedData();
  </script>
</body>
</html>
