<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audiobook</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%); min-height: 100vh; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    .header { margin-bottom: 40px; }
    .header h1 { font-size: 32px; font-weight: 300; color: #111; margin-bottom: 8px; }
    .header p { color: #999; font-size: 14px; }
    .upload-area { background: white; border: 2px dashed #e5e7eb; border-radius: 12px; padding: 48px; text-align: center; cursor: pointer; transition: all 0.3s; }
    .upload-area:hover { border-color: #cbd5e1; }
    .upload-area input { display: none; }
    .upload-icon { width: 64px; height: 64px; background: #eff6ff; border-radius: 8px; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-size: 28px; }
    .upload-text { color: #374151; font-weight: 500; margin-bottom: 4px; }
    .upload-sub { color: #9ca3af; font-size: 13px; }
    .hidden { display: none !important; }
    .books-list { background: white; border-radius: 12px; border: 1px solid #e5e7eb; margin-bottom: 20px; padding: 0; }
    .book-item { padding: 16px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: all 0.2s; }
    .book-item:hover { background: #f9fafb; }
    .book-item:last-child { border-bottom: none; }
    .book-item.active { background: #eff6ff; }
    .book-info { flex: 1; }
    .book-name { font-weight: 500; color: #111; }
    .book-progress { font-size: 12px; color: #999; margin-top: 4px; }
    .book-actions { display: flex; gap: 8px; }
    .btn-select { padding: 6px 12px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
    .btn-select:hover { background: #1d4ed8; }
    .btn-delete { padding: 6px 12px; background: #fee2e2; color: #dc2626; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
    .btn-delete:hover { background: #fecaca; }
    .file-info { background: white; border-radius: 12px; padding: 20px; border: 1px solid #e5e7eb; margin-bottom: 20px; }
    .file-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .file-name { font-size: 18px; font-weight: 500; color: #111; }
    .progress-box { background: white; border-radius: 12px; padding: 20px; border: 1px solid #e5e7eb; margin-bottom: 20px; }
    .progress-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .progress-label-text { font-size: 11px; color: #999; text-transform: uppercase; }
    .progress-percent { font-family: monospace; font-size: 12px; font-weight: 600; color: #666; }
    .progress-bar { width: 100%; height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #2563eb, #3b82f6); transition: width 0.3s; }
    .char-info { font-size: 12px; color: #999; margin-top: 8px; font-family: monospace; }
    .controls { background: white; border-radius: 12px; padding: 32px; border: 1px solid #e5e7eb; }
    .playback-controls { display: flex; justify-content: center; gap: 16px; margin-bottom: 24px; }
    .btn-skip { padding: 12px; background: #f3f4f6; border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s; color: #374151; font-size: 14px; }
    .btn-skip:hover { background: #e5e7eb; }
    .btn-play { padding: 16px 32px; background: linear-gradient(135deg, #2563eb, #1d4ed8); border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: 600; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); transition: all 0.2s; }
    .btn-play:hover { box-shadow: 0 6px 16px rgba(37, 99, 235, 0.4); }
    .divider { height: 1px; background: #e5e7eb; margin: 20px 0; }
    .sliders { display: flex; flex-direction: column; gap: 20px; margin-bottom: 20px; }
    .slider-group label { font-size: 14px; font-weight: 500; color: #374151; margin-bottom: 8px; display: flex; justify-content: space-between; }
    .slider-value { font-family: monospace; font-size: 12px; color: #666; }
    input[type="range"] { width: 100%; height: 6px; border-radius: 3px; background: #e5e7eb; outline: none; accent-color: #2563eb; cursor: pointer; }
    input[type="text"] { width: 100%; padding: 8px; border: 1px solid #e5e7eb; border-radius: 6px; margin-bottom: 12px; }
    .btn-change { width: 100%; padding: 12px; background: #f3f4f6; border: none; border-radius: 8px; color: #374151; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .btn-change:hover { background: #e5e7eb; }
    .preview { background: white; border-radius: 12px; padding: 20px; border: 1px solid #e5e7eb; margin-top: 32px; }
    .preview-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px; }
    .preview-text { font-family: monospace; font-size: 12px; color: #666; line-height: 1.6; max-height: 200px; overflow-y: auto; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Library Section -->
    <div id="librarySection">
      <div class="header">
        <h1>Audiobook Library</h1>
        <p>Tus libros guardados</p>
      </div>

      <div class="books-list" id="booksList"></div>

      <div style="margin-bottom: 20px;">
        <p style="color: #666; font-size: 14px; margin-bottom: 12px;">Agregar nuevo libro:</p>
        <label class="upload-area">
          <input type="file" id="pdfInput" accept=".pdf">
          <div class="upload-icon">📄</div>
          <div class="upload-text">Arrastra tu PDF aqui o haz clic</div>
          <div class="upload-sub">Hasta 50MB</div>
        </label>
      </div>
    </div>

    <!-- Player Section -->
    <div id="playerSection" class="hidden">
      <div style="margin-bottom: 16px;">
        <button id="backToLibrary" class="btn-change">← Volver a la biblioteca</button>
      </div>

      <div class="file-info">
        <div class="file-label">Leyendo</div>
        <div class="file-name" id="fileName"></div>
      </div>

      <div class="progress-box">
        <div class="progress-label">
          <span class="progress-label-text">Progreso</span>
          <span class="progress-percent" id="progressPercent">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
        <div class="char-info">
          Carácter: <span id="charCount">0</span> de <span id="totalChars">0</span>
        </div>
      </div>

      <div class="controls">
        <div class="playback-controls">
          <button class="btn-skip" id="skipBack">|&lt;</button>
          <button class="btn-play" id="playBtn">PLAY</button>
          <button class="btn-skip" id="skipForward">&gt;|</button>
        </div>

        <div class="sliders">
          <div class="slider-group">
            <label>Buscar en el libro</label>
            <input type="text" id="searchInput" placeholder="Ej: introducción, capítulo 3, etc.">
          </div>

          <div class="slider-group">
            <label>
              <span>Velocidad</span>
              <span class="slider-value" id="speedValue">1.0x</span>
            </label>
            <input type="range" id="speedSlider" min="0.5" max="2" step="0.1" value="1">
          </div>

          <div class="slider-group">
            <label>
              <span>Volumen</span>
              <span class="slider-value" id="volumeValue">100%</span>
            </label>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="1">
          </div>
        </div>

        <div class="divider"></div>

        <button class="btn-change" id="changeBtn">Cambiar archivo</button>
      </div>

      <div class="preview">
        <div class="preview-label">Vista previa</div>
        <div class="preview-text" id="preview"></div>
      </div>
    </div>
  </div>

  <script>
    window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let books = {}; // { bookId: { name, text, chunks, currentChunkIndex } }
    let currentBookId = null;
    let pdfText = '';
    let chunks = [];
    let currentChunkIndex = 0;
    let isSpeaking = false;
    let utterance = null;

    const elements = {
      librarySection: document.getElementById('librarySection'),
      playerSection: document.getElementById('playerSection'),
      pdfInput: document.getElementById('pdfInput'),
      booksList: document.getElementById('booksList'),
      fileName: document.getElementById('fileName'),
      progressFill: document.getElementById('progressFill'),
      progressPercent: document.getElementById('progressPercent'),
      playBtn: document.getElementById('playBtn'),
      skipBack: document.getElementById('skipBack'),
      skipForward: document.getElementById('skipForward'),
      changeBtn: document.getElementById('changeBtn'),
      backToLibrary: document.getElementById('backToLibrary'),
      speedSlider: document.getElementById('speedSlider'),
      speedValue: document.getElementById('speedValue'),
      volumeSlider: document.getElementById('volumeSlider'),
      volumeValue: document.getElementById('volumeValue'),
      searchInput: document.getElementById('searchInput'),
      preview: document.getElementById('preview'),
      charCount: document.getElementById('charCount'),
      totalChars: document.getElementById('totalChars')
    };

    // Load books from localStorage
    function loadBooks() {
      const saved = localStorage.getItem('audiobookLibrary');
      if (saved) {
        try {
          books = JSON.parse(saved);
        } catch (e) {
          console.error('Error loading books:', e);
          books = {};
        }
      }
      updateBooksList();
    }

    // Save books to localStorage
    function saveBooks() {
      localStorage.setItem('audiobookLibrary', JSON.stringify(books));
    }

    // Update books list UI
    function updateBooksList() {
      elements.booksList.innerHTML = '';
      if (Object.keys(books).length === 0) {
        elements.booksList.innerHTML = '<div style="padding: 20px; text-align: center; color: #999;">No hay libros guardados</div>';
        return;
      }

      Object.entries(books).forEach(([bookId, book]) => {
        const isActive = bookId === currentBookId;
        const progress = Math.round((book.currentChunkIndex / book.chunks.length) * 100) || 0;
        const html = `
          <div class="book-item ${isActive ? 'active' : ''}">
            <div class="book-info">
              <div class="book-name">${book.name}</div>
              <div class="book-progress">Progreso: ${progress}%</div>
            </div>
            <div class="book-actions">
              <button class="btn-select" onclick="selectBook('${bookId}')">Leer</button>
              <button class="btn-delete" onclick="deleteBook('${bookId}')">Borrar</button>
            </div>
          </div>
        `;
        elements.booksList.innerHTML += html;
      });
    }

    // Select a book to read
    window.selectBook = function(bookId) {
      if (!books[bookId]) return;
      
      currentBookId = bookId;
      const book = books[bookId];
      pdfText = book.text;
      chunks = book.chunks;
      currentChunkIndex = book.currentChunkIndex;

      elements.fileName.textContent = book.name;
      elements.preview.textContent = pdfText.substring(0, 500) + (pdfText.length > 500 ? '...' : '');
      elements.totalChars.textContent = pdfText.length.toLocaleString();
      updateProgress();

      elements.librarySection.classList.add('hidden');
      elements.playerSection.classList.remove('hidden');
    };

    // Delete a book
    window.deleteBook = function(bookId) {
      if (confirm('¿Borrar este libro?')) {
        delete books[bookId];
        saveBooks();
        if (currentBookId === bookId) {
          currentBookId = null;
          elements.playerSection.classList.add('hidden');
          elements.librarySection.classList.remove('hidden');
        }
        updateBooksList();
      }
    };

    // Create chunks
    function createChunks(text) {
      const CHUNK_SIZE = 25000;
      const chunkArray = [];
      let currentPos = 0;
      while (currentPos < text.length) {
        let endPos = Math.min(currentPos + CHUNK_SIZE, text.length);
        if (endPos < text.length) {
          let searchEnd = endPos;
          while (searchEnd > currentPos && text[searchEnd] !== '.' && text[searchEnd] !== '\n') {
            searchEnd--;
          }
          if (searchEnd > currentPos) { endPos = searchEnd + 1; }
        }
        chunkArray.push(text.substring(currentPos, endPos));
        currentPos = endPos;
      }
      return chunkArray;
    }

    // Handle PDF upload
    elements.pdfInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      try {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await window.pdfjsLib.getDocument(arrayBuffer).promise;
        let fullText = '';

        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const textContent = await page.getTextContent();
          const pageText = textContent.items.map(item => item.str).join(' ');
          fullText += pageText + '\n\n';
        }

        const bookId = Date.now().toString();
        books[bookId] = {
          name: file.name.replace('.pdf', ''),
          text: fullText,
          chunks: createChunks(fullText),
          currentChunkIndex: 0
        };

        saveBooks();
        updateBooksList();
        selectBook(bookId);
        elements.pdfInput.value = '';
      } catch (error) {
        console.error('Error:', error);
        alert('Error cargando PDF');
      }
    });

    function speakChunk(chunkIndex) {
      if (chunks.length === 0 || chunkIndex >= chunks.length) {
        isSpeaking = false;
        updatePlayButton();
        return;
      }

      utterance = new SpeechSynthesisUtterance(chunks[chunkIndex]);
      utterance.rate = parseFloat(elements.speedSlider.value);
      utterance.volume = parseFloat(elements.volumeSlider.value);

      utterance.onstart = () => {
        isSpeaking = true;
        currentChunkIndex = chunkIndex;
        updateProgress();
        updatePlayButton();
      };

      utterance.onend = () => {
        if (chunkIndex < chunks.length - 1) {
          setTimeout(() => speakChunk(chunkIndex + 1), 100);
        } else {
          isSpeaking = false;
          currentChunkIndex = 0;
          updateProgress();
          updatePlayButton();
        }
        if (currentBookId && books[currentBookId]) {
          books[currentBookId].currentChunkIndex = currentChunkIndex;
          saveBooks();
        }
      };

      utterance.onpause = () => {
        isSpeaking = false;
        updatePlayButton();
      };

      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(utterance);
    }

    function updateProgress() {
      const percent = chunks.length > 0 ? (currentChunkIndex / chunks.length) * 100 : 0;
      elements.progressFill.style.width = percent + '%';
      elements.progressPercent.textContent = Math.round(percent) + '%';
      
      let charCount = 0;
      for (let i = 0; i < currentChunkIndex; i++) {
        charCount += chunks[i].length;
      }
      elements.charCount.textContent = charCount.toLocaleString();
    }

    function updatePlayButton() {
      elements.playBtn.textContent = isSpeaking ? 'PAUSA' : 'PLAY';
    }

    elements.playBtn.addEventListener('click', () => {
      if (isSpeaking) {
        window.speechSynthesis.pause();
        isSpeaking = false;
        updatePlayButton();
      } else {
        const synth = window.speechSynthesis;
        if (synth.paused) {
          synth.resume();
          isSpeaking = true;
        } else {
          speakChunk(currentChunkIndex);
        }
        updatePlayButton();
      }
    });

    elements.skipBack.addEventListener('click', () => {
      currentChunkIndex = Math.max(0, currentChunkIndex - 1);
      updateProgress();
      if (isSpeaking) {
        window.speechSynthesis.cancel();
        setTimeout(() => speakChunk(currentChunkIndex), 100);
      }
    });

    elements.skipForward.addEventListener('click', () => {
      currentChunkIndex = Math.min(chunks.length - 1, currentChunkIndex + 1);
      updateProgress();
      if (isSpeaking) {
        window.speechSynthesis.cancel();
        setTimeout(() => speakChunk(currentChunkIndex), 100);
      }
    });

    elements.changeBtn.addEventListener('click', () => {
      if (currentBookId && books[currentBookId]) {
        books[currentBookId].currentChunkIndex = currentChunkIndex;
        saveBooks();
      }
      window.speechSynthesis.cancel();
      pdfText = '';
      chunks = [];
      currentChunkIndex = 0;
      isSpeaking = false;
      currentBookId = null;
      elements.playerSection.classList.add('hidden');
      elements.librarySection.classList.remove('hidden');
      updateBooksList();
    });

    elements.backToLibrary.addEventListener('click', () => {
      if (currentBookId && books[currentBookId]) {
        books[currentBookId].currentChunkIndex = currentChunkIndex;
        saveBooks();
      }
      window.speechSynthesis.cancel();
      elements.playerSection.classList.add('hidden');
      elements.librarySection.classList.remove('hidden');
      updateBooksList();
    });

    elements.speedSlider.addEventListener('input', (e) => {
      elements.speedValue.textContent = e.target.value + 'x';
    });

    elements.volumeSlider.addEventListener('input', (e) => {
      elements.volumeValue.textContent = Math.round(e.target.value * 100) + '%';
    });

    elements.searchInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        const searchTerm = elements.searchInput.value.toLowerCase();
        const pdfTextLower = pdfText.toLowerCase();
        const foundIndex = pdfTextLower.indexOf(searchTerm);
        
        if (foundIndex !== -1) {
          let charCount = 0;
          for (let i = 0; i < chunks.length; i++) {
            charCount += chunks[i].length;
            if (charCount >= foundIndex) {
              currentChunkIndex = i;
              updateProgress();
              window.speechSynthesis.cancel();
              setTimeout(() => {
                speakChunk(currentChunkIndex);
                alert('Se encontró: ' + searchTerm + '\n¡Comenzando a leer!');
              }, 100);
              elements.searchInput.value = '';
              break;
            }
          }
        } else {
          alert('No se encontró: ' + searchTerm);
        }
      }
    });

    // Initialize
    loadBooks();
  </script>
</body>
</html>
